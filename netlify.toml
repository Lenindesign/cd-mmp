[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"
  ignore = "node scripts/netlify-ignore-build.mjs"

[build.environment]
  NODE_VERSION = "20"

[functions]
  node_bundler = "esbuild"

[[redirects]]
  from = "/deals/zero-apr"
  to = "/deals/best-buying-deals"
  status = 301

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200





















